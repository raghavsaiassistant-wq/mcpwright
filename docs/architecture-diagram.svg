<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Segoe UI, -apple-system, BlinkMacSystemFont, sans-serif">
  <!-- Background -->
  <rect width="1200" height="900" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-size="36" font-weight="700" fill="#f8fafc">
    How mcpwright works
  </text>
  <text x="600" y="85" text-anchor="middle" font-size="18" font-weight="400" fill="#94a3b8">
    4 layers between your AI agent and a real browser
  </text>

  <!-- Layer 1: AI Agent -->
  <g>
    <rect x="200" y="130" width="800" height="110" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
    <text x="600" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="#a5b4fc" letter-spacing="2">
      LAYER 1
    </text>
    <text x="600" y="200" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">
      Your AI Agent
    </text>
    <text x="600" y="225" text-anchor="middle" font-size="14" fill="#cbd5e1">
      GPT-4 · Claude · Llama · any LLM with function-calling
    </text>
  </g>

  <!-- Arrow 1 -->
  <g>
    <line x1="600" y1="250" x2="600" y2="295" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="615" y="278" font-size="12" fill="#94a3b8" font-style="italic">natural language</text>
  </g>

  <!-- Layer 2: mcpwright (THE LIBRARY) -->
  <g>
    <rect x="120" y="305" width="960" height="180" rx="12" fill="#1e1b4b" stroke="#fbbf24" stroke-width="3"/>
    <text x="600" y="340" text-anchor="middle" font-size="14" font-weight="600" fill="#fcd34d" letter-spacing="2">
      LAYER 2 — THE MISSING LAYER
    </text>
    <text x="600" y="375" text-anchor="middle" font-size="28" font-weight="700" fill="#fde68a">
      mcpwright
    </text>
    <text x="600" y="400" text-anchor="middle" font-size="14" fill="#fef3c7">
      Smart waits · React-aware typing · Selector fallback · Auto-retry
    </text>

    <!-- 3 helper boxes -->
    <rect x="170" y="420" width="240" height="50" rx="6" fill="#312e81" stroke="#fbbf24" stroke-width="1"/>
    <text x="290" y="450" text-anchor="middle" font-size="13" font-weight="600" fill="#fde68a">smart_wait()</text>
    <text x="290" y="463" text-anchor="middle" font-size="11" fill="#fef3c7">wait for state, not time</text>

    <rect x="480" y="420" width="240" height="50" rx="6" fill="#312e81" stroke="#fbbf24" stroke-width="1"/>
    <text x="600" y="450" text-anchor="middle" font-size="13" font-weight="600" fill="#fde68a">react_aware_type()</text>
    <text x="600" y="463" text-anchor="middle" font-size="11" fill="#fef3c7">real keyboard for React</text>

    <rect x="790" y="420" width="240" height="50" rx="6" fill="#312e81" stroke="#fbbf24" stroke-width="1"/>
    <text x="910" y="450" text-anchor="middle" font-size="13" font-weight="600" fill="#fde68a">retry()</text>
    <text x="910" y="463" text-anchor="middle" font-size="11" fill="#fef3c7">exponential backoff</text>
  </g>

  <!-- Arrow 2 -->
  <g>
    <line x1="600" y1="495" x2="600" y2="540" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="615" y="522" font-size="12" fill="#94a3b8" font-style="italic">JSON-RPC over stdio</text>
  </g>

  <!-- Layer 3: Playwright MCP -->
  <g>
    <rect x="200" y="550" width="800" height="110" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <text x="600" y="590" text-anchor="middle" font-size="14" font-weight="600" fill="#67e8f9" letter-spacing="2">
      LAYER 3
    </text>
    <text x="600" y="620" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">
      Playwright MCP Server
    </text>
    <text x="600" y="645" text-anchor="middle" font-size="14" fill="#cbd5e1">
      23 tools: navigate, click, type, screenshot, evaluate…
    </text>
  </g>

  <!-- Arrow 3 -->
  <g>
    <line x1="600" y1="670" x2="600" y2="715" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="615" y="697" font-size="12" fill="#94a3b8" font-style="italic">Chrome DevTools Protocol</text>
  </g>

  <!-- Layer 4: Browser -->
  <g>
    <rect x="200" y="725" width="800" height="110" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="600" y="765" text-anchor="middle" font-size="14" font-weight="600" fill="#6ee7b7" letter-spacing="2">
      LAYER 4
    </text>
    <text x="600" y="795" text-anchor="middle" font-size="22" font-weight="700" fill="#f8fafc">
      Your Real Browser
    </text>
    <text x="600" y="820" text-anchor="middle" font-size="14" fill="#cbd5e1">
      Chrome / Edge / Firefox with your saved logins
    </text>
  </g>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="600" y="880" text-anchor="middle" font-size="13" fill="#64748b">
    github.com/raghavsaiassistant-wq/mcpwright · MIT License · v0.1.0
  </text>
</svg>
